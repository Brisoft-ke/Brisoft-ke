name: Update Greeting

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour
  workflow_dispatch:        # allows manual trigger

jobs:
  update-greeting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set greeting based on EAT time (UTC+3)
        id: greeting
        run: |
          # East Africa Time is UTC+3 (Nairobi/Kenya)
          HOUR=$(TZ="Africa/Nairobi" date +%H)
          HOUR=$((10#$HOUR))  # strip leading zero

          if [ $HOUR -ge 5 ] && [ $HOUR -lt 12 ]; then
            GREETING="🌅 Good Morning, World! — Coffee ☕ + Code = Productivity"
          elif [ $HOUR -ge 12 ] && [ $HOUR -lt 17 ]; then
            GREETING="☀️ Good Afternoon, World! — Deep work mode activated 💻"
          elif [ $HOUR -ge 17 ] && [ $HOUR -lt 21 ]; then
            GREETING="🌙 Good Evening, World! — Late night commits hit different 🌙"
          else
            GREETING="🌃 Good Night, World! — Even devs need sleep 😴"
          fi

          echo "greeting=$GREETING" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          GREETING="${{ steps.greeting.outputs.greeting }}"

          # Replace content between the GREETING comment tags
          python3 - <<EOF
          import re

          with open("README.md", "r") as f:
              content = f.read()

          new_block = f"<!-- GREETING_START -->\n{GREETING}\n<!-- GREETING_END -->"
          updated = re.sub(
              r"<!-- GREETING_START -->.*?<!-- GREETING_END -->",
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update greeting [skip ci]"
          git push
