name: Update Greeting

on:
  schedule:
    - cron: "0 * * * *"   # runs every hour on the hour
  workflow_dispatch:        # allows manual trigger from Actions tab

jobs:
  update-greeting:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set animated SVG greeting based on EAT time (UTC+3)
        id: greeting
        run: |
          HOUR=$(TZ="Africa/Nairobi" date +%H)
          HOUR=$((10#$HOUR))

          # -----------------------------------------------
          # TIME BOUNDARIES (24-hour EAT clock):
          #   Morning:   00:01 – 12:00  (midnight to noon)
          #   Afternoon: 12:00 – 15:00  (noon to 3pm)
          #   Evening:   15:00 – 21:00  (3pm to 9pm)
          #   Night:     21:00 – 00:00  (9pm to midnight)
          #
          # TO CHANGE: edit the numbers below.
          # Example — make afternoon end at 2pm: change 15 to 14
          # -----------------------------------------------
          if [ $HOUR -ge 0 ] && [ $HOUR -lt 12 ]; then
            LINE="🌅+Good+Morning%2C+World!+—+Coffee+%E2%98%95+%2B+Code+%3D+Productivity"
          elif [ $HOUR -ge 12 ] && [ $HOUR -lt 15 ]; then
            LINE="☀️+Good+Afternoon%2C+World!+—+Deep+work+mode+activated+💻"
          elif [ $HOUR -ge 15 ] && [ $HOUR -lt 21 ]; then
            LINE="🌙+Good+Evening%2C+World!+—+Late+night+commits+hit+different+🌙"
          else
            LINE="🌃+Good+Night%2C+World!+—+Even+devs+need+sleep+😴"
          fi

          # width=800 ensures full text is never cut off
          IMG='<img src="https://readme-typing-svg.herokuapp.com?font=Fira+Code&size=22&pause=99999&color=00F5A0&center=true&vCenter=true&width=800&lines='"$LINE"'" alt="Greeting" />'
          echo "img=$IMG" >> $GITHUB_OUTPUT

      - name: Update README
        run: |
          python3 - <<'EOF'
          import re, os

          img = os.environ["GREETING_IMG"]

          with open("README.md", "r") as f:
              content = f.read()

          new_block = f"<!-- GREETING_START -->\n{img}\n<!-- GREETING_END -->"
          updated = re.sub(
              r"<!-- GREETING_START -->.*?<!-- GREETING_END -->",
              new_block,
              content,
              flags=re.DOTALL
          )

          with open("README.md", "w") as f:
              f.write(updated)
          EOF
        env:
          GREETING_IMG: ${{ steps.greeting.outputs.img }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update greeting [skip ci]"
          git push
